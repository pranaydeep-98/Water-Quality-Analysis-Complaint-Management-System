# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/water_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== HIBERNATE =====
# CRITICAL — must be 'update' to preserve data across restarts
# Never use 'create' or 'create-drop' — they delete all data on restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
jwt.secret=aquawatchSecretKey123456789LongEnoughForSecurity
jwt.expiration=86400000

# ===== SERVER =====
server.port=8081

# ===== LOGGING =====
logging.level.org.springframework.security=DEBUG

# Prevent Spring from running schema.sql or data.sql on startup
spring.sql.init.mode=never