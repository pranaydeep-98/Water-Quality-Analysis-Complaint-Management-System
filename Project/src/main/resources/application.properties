# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/water_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
jwt.secret=yourSecretKeyHereMakeItLongAndSecure123456789
jwt.expiration=86400000

# ===== SERVER =====
server.port=8081
spring.application.name=water-quality-complaint-system